<!DOCTYPE html>
<html>
<head>
    <title>Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3 class="mb-3">Product Management</h3>

        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-primary" onclick="getProducts()">Load All</button>
            <button class="btn btn-success" onclick="showAvailable()">Available Only</button>

            <select class="form-select w-auto" id="categoryFilter" onchange="filterCategory()">
                <option value="">Filter Category</option>
            </select>
        </div>

        <div id="loading" class="text-center text-muted mb-2"></div>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody id="productTable"></tbody>
        </table>
    </div>

    <div class="card shadow p-4 mt-4">
        <h4>Add New Product</h4>

        <form onsubmit="addProduct(event)">
            <div class="row g-3">

                <div class="col-md-3">
                    <input type="text" id="name" class="form-control" placeholder="Product Name" required>
                </div>

                <div class="col-md-3">
                    <input type="text" id="category" class="form-control" placeholder="Category" required>
                </div>

                <div class="col-md-3">
                    <input type="number" id="price" class="form-control" placeholder="Price" required>
                </div>

                <div class="col-md-3">
                    <input type="number" id="stock" class="form-control" placeholder="Stock" required>
                </div>

                <div class="col-12">
                    <button class="btn btn-primary">Add Product</button>
                </div>

            </div>
        </form>
    </div>

</div>

<script>

const apiUrl = "http://localhost:5005/api/Prod";

function setLoading(message) {
    document.getElementById("loading").innerText = message;
}

function getProducts() {
    setLoading("Loading...");
    fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
            renderTable(data);
            populateCategoryDropdown(data);
            setLoading("");
        })
        .catch(() => setLoading("Error loading data"));
}

function renderTable(products) {
    const table = document.getElementById("productTable");
    table.innerHTML = "";

    if (products.length === 0) {
        table.innerHTML = `<tr><td colspan="5" class="text-center">No Products Found</td></tr>`;
        return;
    }

    products.forEach(p => {
        table.innerHTML += `
            <tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>${p.category}</td>
                <td>Rs ${p.price}</td>
                <td class="${p.stockQuantity === 0 ? 'text-danger' : 'text-success'}">
                    ${p.stockQuantity}
                </td>
            </tr>
        `;
    });
}

function addProduct(event) {
    event.preventDefault();

    const product = {
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        price: Number(document.getElementById("price").value),
        stockQuantity: Number(document.getElementById("stock").value)
    };

    fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(product)
    })
   .then(response => response.text())
  .then(msg => {
    alert(msg);
    getProducts();
    event.target.reset();
   })
    .then(data => {
        console.log("Added:", data);
        getProducts();
        event.target.reset();
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Failed to add product");
    });
}




function filterCategory() {
    const category = categoryFilter.value;

    if (!category) {
        getProducts();
        return;
    }

    fetch(`${apiUrl}/category/${category}`)
        .then(res => res.json())
        .then(data => renderTable(data));
}

function showAvailable() {
    fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
            const available = data.filter(p => p.stockQuantity > 0);
            renderTable(available);
        });
}

function populateCategoryDropdown(products) {
    const dropdown = document.getElementById("categoryFilter");
    const categories = [...new Set(products.map(p => p.category))];

    dropdown.innerHTML = `<option value="">Filter Category</option>`;

    categories.forEach(cat => {
        dropdown.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
}

getProducts();

</script>

</body>
</html>
